name: Update Database

permissions:
  contents: write

on:
  schedule:
    # Run every Sunday at 2:00 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:  # Allow manual triggering

jobs:
  update-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@f94ec6bedd8674c4426838e6b50417d36b6ab231
        with:
          version: "0.5.21"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38
        with:
          python-version-file: ".python-version"

      - name: Install project dependencies
        run: uv sync --all-extras

      - name: Run database update pipeline
        run: |
          source .venv/bin/activate
          python .github/scripts/update_database.py
        env:
          PYTHONPATH: ${{ github.workspace }}/src

      - name: Check for database changes
        id: check_changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Check if there are changes to the database file
          if git diff --quiet HEAD -- src/usa_npn_mcp_server/data/ancillary_data.db; then
            echo "No changes detected in database"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Database changes detected"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push database changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git add src/usa_npn_mcp_server/data/ancillary_data.db
          git add src/usa_npn_mcp_server/utils/endpoints.py

          # Create commit with informative message
          git commit -m "🤖 Update ancillary database with latest USA-NPN data

          - Downloaded fresh data from USA-NPN API endpoints
          - Rebuilt SQLite database with latest information
          - Applied column filtering and data cleaning

          Automated update via GitHub Actions
          $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          git push

      - name: Report completion
        run: |
          if [ "${{ steps.check_changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ Database updated successfully with new data"
          else
            echo "ℹ️ Database is already up to date - no changes made"
          fi
